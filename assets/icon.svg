<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B5CF5"/>
      <stop offset="100%" stop-color="#E04DA0"/>
    </linearGradient>
    <linearGradient id="layer-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.18)"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg-grad)"/>

  <!-- Back layer card (semi-transparent, offset up-left) -->
  <rect x="24" y="26" width="52" height="62" rx="8" fill="url(#layer-grad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>

  <!-- Front layer card (white, offset down-right) -->
  <rect x="44" y="40" width="56" height="64" rx="8" fill="white" opacity="0.95"/>

  <!-- Diff/change indicator lines on front card -->
  <rect x="52" y="52" width="28" height="4" rx="2" fill="#7B5CF5" opacity="0.5"/>
  <rect x="52" y="61" width="38" height="4" rx="2" fill="#7B5CF5" opacity="0.35"/>
  <rect x="52" y="70" width="22" height="4" rx="2" fill="#E04DA0" opacity="0.5"/>
  <rect x="52" y="79" width="32" height="4" rx="2" fill="#E04DA0" opacity="0.35"/>
  <rect x="52" y="88" width="18" height="4" rx="2" fill="#7B5CF5" opacity="0.25"/>

  <!-- Notification bell -->
  <g transform="translate(96, 28)">
    <circle cx="0" cy="0" r="16" fill="#FF6B6B"/>
    <!-- Bell icon inside the circle -->
    <path d="M-6 2 L-6-2 Q-6-7 0-7 Q6-7 6-2 L6 2 Z" fill="white" stroke="none"/>
    <rect x="-7" y="2" width="14" height="2.5" rx="1.2" fill="white"/>
    <circle cx="0" cy="6.5" r="2" fill="white"/>
    <!-- Bell top knob -->
    <circle cx="0" cy="-8.5" r="1.5" fill="white"/>
  </g>
</svg>
